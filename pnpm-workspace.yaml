packages:
  - .
  - fixtures/consumer
  - preview/web
  - vendor/lix/packages/js-sdk
  - "!vendor/lix/packages/**/dist"

minimumReleaseAge: 10080

peerDependencyRules:
  allowedVersions:
    "@glideapps/glide-data-grid>react": ^19.0.0
    "@glideapps/glide-data-grid>react-dom": ^19.0.0
    # The pinned checkpoint PR still reports the pre-release package version.
    "@opral/atelier>@lix-js/sdk": 0.8.4

overrides:
  prosemirror-model: 1.25.10
  prosemirror-transform: 1.12.0
  prosemirror-view: 1.42.0

allowBuilds:
  "@parcel/watcher": true
  esbuild: true
  sharp: set this to true or false
  workerd: set this to true or false

minimumReleaseAgeExclude:
  - "@lix-js/sdk-darwin-arm64@0.8.2"
  - "@lix-js/sdk-darwin-arm64@0.8.4"
  - "@lix-js/sdk-linux-arm64@0.8.2"
  - "@lix-js/sdk-linux-arm64@0.8.4"
  - "@lix-js/sdk-linux-x64@0.8.2"
  - "@lix-js/sdk-linux-x64@0.8.4"
  - "@lix-js/sdk-win32-x64@0.8.2"
  - "@lix-js/sdk-win32-x64@0.8.4"
  - "@lix-js/sdk@0.8.2"
  - "@lix-js/sdk@0.8.4"

onlyBuiltDependencies:
  - "@parcel/watcher"
  - esbuild
